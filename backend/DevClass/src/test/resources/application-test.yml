spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;NON_KEYWORDS=value
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        "[format_sql]": false
    show-sql: false
  mail:
    host: localhost
    port: 25
    username: test@test.com
    password: testpass

jwt:
  secret: testsecret1234567890testsecret1234567890testsecret
  expiration-ms: 86400000

toss:
  secret-key: test_secret_key

discord:
  webhook-url: ""

sentry:
  dsn: ""

management:
  endpoints:
    web:
      exposure:
        include: health
