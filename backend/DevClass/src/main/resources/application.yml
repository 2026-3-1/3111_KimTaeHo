spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/devclass}
    username: ${DB_USERNAME:dev}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        "[format_sql]": true
    show-sql: true

  sql:
    init:
      mode: never

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

jwt:
  secret: ${JWT_SECRET}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  admin-expiration-ms: ${JWT_ADMIN_EXPIRATION_MS:3600000}

admin:
  allowed-ips: ${ADMIN_ALLOWED_IPS:0.0.0.0}

toss:
  secret-key: ${TOSS_SECRET_KEY}

discord:
  webhook-url: ${DISCORD_WEBHOOK_URL:}

refund:
  max-progress-percent: ${REFUND_MAX_PROGRESS_PERCENT:30}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: devclass

server:
  port: ${SERVER_PORT:8080}

sentry:
  dsn: ${SENTRY_DSN:}
  traces-sample-rate: 0.2
  environment: ${SPRING_PROFILES_ACTIVE:local}

logging:
  level:
    "[org.hibernate.SQL]": DEBUG
    "[rlaxogh76.DevClass]": DEBUG

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
  api-docs:
    path: /v3/api-docs
    enabled: true
