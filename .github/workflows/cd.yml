name: CD — Deploy to EC2

on:
  push:
    branches: [ main ]

# main 브랜치에 동시에 여러 CD가 실행되지 않도록 직렬화
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy via Docker Compose (EC2)
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      # ── 1. Docker Hub 이미지 빌드 & 푸시 ─────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend/DevClass
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/devclass-backend:${{ github.sha }},${{ secrets.DOCKER_USERNAME }}/devclass-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/devclass-frontend:${{ github.sha }},${{ secrets.DOCKER_USERNAME }}/devclass-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── 2. EC2 배포 디렉터리 & docker-compose 동기화 ─────────────────
      - name: Prepare EC2 deploy directory
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          password: ${{ secrets.EC2_PASSWORD }}
          script: mkdir -p ~/devclass

      - name: Sync docker-compose.yml to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          password: ${{ secrets.EC2_PASSWORD }}
          source: docker-compose.yml
          target: ~/devclass/

      # ── 3. EC2 서버에 SSH 접속 후 배포 ───────────────────────────────
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          password: ${{ secrets.EC2_PASSWORD }}
          script: |
            set -e
            cd ~/devclass

            # 환경변수 파일 갱신 (GitHub Secrets → .env)
            cat > .env <<EOF
            DB_USERNAME=${{ secrets.DB_USERNAME }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            DB_ROOT_PASSWORD=${{ secrets.DB_ROOT_PASSWORD }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            TOSS_SECRET_KEY=${{ secrets.TOSS_SECRET_KEY }}
            MAIL_USERNAME=${{ secrets.MAIL_USERNAME }}
            MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }}
            DISCORD_WEBHOOK_URL=${{ secrets.DISCORD_WEBHOOK_URL }}
            SENTRY_DSN=${{ secrets.SENTRY_DSN }}
            DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}
            IMAGE_TAG=${{ github.sha }}
            EOF

            # 최신 이미지로 무중단 재배포
            docker compose pull
            docker compose up -d --remove-orphans

            # 헬스체크 (최대 120초 대기)
            HEALTHY=0
            for i in $(seq 1 24); do
              if curl -s http://localhost:8080/actuator/health | grep -q '"status":"UP"'; then
                echo "✅ 헬스체크 통과"
                HEALTHY=1
                break
              fi
              echo "⏳ 대기 중... ($i/24)"
              sleep 5
            done

            if [ $HEALTHY -eq 0 ]; then
              echo "❌ 헬스체크 실패 — 배포 롤백"
              docker compose logs --tail=50 backend
              exit 1
            fi

            # 미사용 이미지 정리
            docker image prune -f
