services:
  db:
    image: mysql:8.0
    container_name: devclass-db
    environment:
      MYSQL_DATABASE: devclass
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ${DOCKER_USERNAME}/devclass-backend:${IMAGE_TAG:-latest}
    container_name: devclass-backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:mysql://db:3306/devclass
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      TOSS_SECRET_KEY: ${TOSS_SECRET_KEY}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL}
      SENTRY_DSN: ${SENTRY_DSN}
    ports:
      - "8080:8080"

  frontend:
    image: ${DOCKER_USERNAME}/devclass-frontend:${IMAGE_TAG:-latest}
    container_name: devclass-frontend
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  db-data:
